<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化模型合集 | 我的个人网站</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --text-color: #333333;
            --card-bg: #ffffff;
            --accent-color: #0366d6;
            --border-color: rgba(0, 0, 0, 0.08);
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --hover-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 自动侦测操作系统的深色模式并切换配色 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --card-bg: #1e1e1e;
                --accent-color: #58a6ff;
                --border-color: rgba(255, 255, 255, 0.08);
                --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
                --hover-shadow: 0 12px 24px rgba(0, 0, 0, 0.6);
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin: 5rem 0 4rem 0;
            padding: 0 2rem;
        }

        header h1 {
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 1rem;
        }

        header p {
            font-size: 1.15rem;
            opacity: 0.7;
            font-weight: 300;
        }

        /* 响应式网格容器 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 1200px;
            padding: 0 2rem 5rem 2rem;
            box-sizing: border-box;
        }

        /* 卡片物理悬浮属性 */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: var(--text-color);
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* 悬浮交互：微距 Y 轴平移与阴影加深 */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--hover-shadow);
            border-color: var(--accent-color);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
        }

        .card:hover .card-icon {
            transform: scale(1.1);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--accent-color);
            margin: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>可视化模型合集</h1>
        <p>基于底层逻辑与算法的数据驱动型前端展现</p>
    </header>
    <div class="grid-container">
        <a href="./game-of-life/index.html" class="card">
            <div class="card-icon">⚙️</div>
            <h2 class="card-title">Game Of Life</h2>
        </a>
        <a href="./pathfinding-astar/index.html" class="card">
            <div class="card-icon">⚙️</div>
            <h2 class="card-title">Pathfinding Astar</h2>
        </a>
        <a href="./pi-beans/index.html" class="card">
            <div class="card-icon">⚙️</div>
            <h2 class="card-title">Pi Beans</h2>
        </a>
        <a href="./sorting-visualizer/index.html" class="card">
            <div class="card-icon">⚙️</div>
            <h2 class="card-title">Sorting Visualizer</h2>
        </a>
        <a href="./wolf-sheep-grass/index.html" class="card">
            <div class="card-icon">⚙️</div>
            <h2 class="card-title">Wolf Sheep Grass</h2>
        </a>
    </div>
</body>
</html>
