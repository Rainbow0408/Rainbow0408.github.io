<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>排序算法可视化</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Sorting Visualizer</h1>
      <p>比较时变红色，交换后变绿色</p>
    </header>

    <section class="controls">
      <div class="control">
        <label for="algorithm">算法</label>
        <select id="algorithm">
          <option value="quick">快速排序</option>
          <option value="merge">归并排序</option>
          <option value="heap">堆排序</option>
          <option value="bubble">冒泡排序</option>
          <option value="selection">选择排序</option>
          <option value="insertion">插入排序</option>
        </select>
      </div>

      <div class="control">
        <label for="distribution">数据分布</label>
        <select id="distribution">
          <option value="random">随机情况</option>
          <option value="worst">最坏情况</option>
        </select>
      </div>

      <div class="control">
        <label for="speed">速度</label>
        <input id="speed" type="range" min="1" max="200" value="80" />
        <span id="speedValue">80</span>
      </div>

      <div class="buttons">
        <button id="generate" class="ghost">生成新数组</button>
        <button id="start" class="primary">开始排序</button>
      </div>
    </section>

    <section class="board">
      <div id="bars" class="bars" aria-label="柱状数组"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
