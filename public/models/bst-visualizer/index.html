<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>二叉搜索树演示</title>
  <style>body{margin:0;font-family:sans-serif;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}canvas{background:white;box-shadow:0 4px 6px -1px rgb(0 0 0 / 0.1);border-radius:12px}h1{color:#1e293b;margin-bottom:8px}p{color:#64748b;margin-bottom:16px}</style>
</head>
<body>
  <h1>二叉搜索树 (BST)</h1>
  <p>正在同步算法逻辑...</p>
  <canvas id="canvas" width="800" height="500"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#6366f1';
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('BST 可视化加载中...', 400, 250);
  </script>
</body>
</html>
