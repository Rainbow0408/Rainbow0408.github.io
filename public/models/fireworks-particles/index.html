<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>粒子烟花</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>粒子烟花</h1>
      <p>点击屏幕发射彩色烟花粒子，观赏物理衰减与叠加效果。</p>
    </header>
    <canvas id="canvas" width="1000" height="600" aria-label="烟花粒子模拟"></canvas>
    <section class="controls">
      <button id="clear" class="primary">清屏</button>
      <label>粒子数量 <span id="countLabel">120</span><input id="count" type="range" min="30" max="300" value="120"></label>
      <label>重力 <span id="gravityLabel">0.06</span><input id="gravity" type="range" min="0" max="0.2" step="0.01" value="0.06"></label>
      <label><input id="auto" type="checkbox"> 自动连续发射</label>
      <p>单击任意位置产生烟花，或开启自动模式。</p>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
