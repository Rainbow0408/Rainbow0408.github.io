<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boids 群体行为</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Boids 群体行为</h1>
      <p>模拟鸟群、鱼群等群体行为：分离、对齐、聚合。</p>
      <p>拖动滑块调节不同规则权重，观察群体形成环状、簇状或散开状态，是探索自组织行为的好玩实验。</p>
    </header>
    <canvas id="canvas" width="1000" height="600" aria-label="boids 群体模拟"></canvas>
    <section class="controls">
      <button id="reset" class="primary">重置</button>
      <button id="toggle" class="ghost">暂停</button>
      <label>数量 <span id="countLabel">120</span><input id="count" type="range" min="30" max="400" value="120"></label>
      <label>分离 <span id="sepLabel">0.06</span><input id="separation" type="range" min="0" max="0.2" step="0.01" value="0.06"></label>
      <label>对齐 <span id="aliLabel">0.01</span><input id="alignment" type="range" min="0" max="0.2" step="0.01" value="0.01"></label>
      <label>聚合 <span id="cohLabel">0.003</span><input id="cohesion" type="range" min="0" max="0.1" step="0.001" value="0.003"></label>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
